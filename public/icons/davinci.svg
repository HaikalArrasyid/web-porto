<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Rainbow border gradient -->
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b30"/>
      <stop offset="30%" stop-color="#4cd964"/>
      <stop offset="60%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#ff3b30"/>
    </linearGradient>
    
    <!-- Top petal (Blue) -->
    <linearGradient id="blue-petal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5ac8fa"/>
      <stop offset="100%" stop-color="#007aff"/>
    </linearGradient>
    
    <!-- Bottom Left (Yellow) -->
    <linearGradient id="yellow-petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
    
    <!-- Bottom Right (Red/Pink) -->
    <linearGradient id="red-petal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#c02425"/>
    </linearGradient>
  </defs>
  
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#1b1c20" />
  
  <!-- Rainbow stroke border -->
  <circle cx="50" cy="50" r="45" stroke="url(#rainbow)" stroke-width="2.5" fill="none" />
  
  <!-- Three petals rotated -->
  <!-- Top Blue Petal -->
  <path d="M 50,47 C 41,38 41,21 50,21 C 59,21 59,38 50,47 Z" fill="url(#blue-petal)" />
  
  <!-- Bottom Left Yellow Petal -->
  <path d="M 50,47 C 41,38 41,21 50,21 C 59,21 59,38 50,47 Z" fill="url(#yellow-petal)" transform="rotate(120 50 50)" />
  
  <!-- Bottom Right Red Petal -->
  <path d="M 50,47 C 41,38 41,21 50,21 C 59,21 59,38 50,47 Z" fill="url(#red-petal)" transform="rotate(240 50 50)" />
</svg>
